<!-- Header -->
<div class="bg-sky-500 text-center text-white px-6 py-4 rounded-t-lg">
  <h2 class="text-lg font-medium">Upload Categorization Rules</h2>
  <p class="text-sm text-gray-200 mt-1">Upload a YAML file with your categorization rules</p>
</div>

<mat-dialog-content class="bg-white px-6 py-4 space-y-4">
  <!-- File upload section -->
  <div class="space-y-3">
    <label for="catRules" class="block text-sm font-medium text-gray-700">
      Select YAML file
    </label>
    <div
      class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:border-gray-400 transition-colors">
      <input type="file" #fileInput id="catRules" name="catRules" accept=".yaml,.yml" class="sr-only"
        (change)="onFileSelected(fileInput)" />
      <label for="catRules" class="cursor-pointer">
        <div class="text-gray-500">
          <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
            <path
              d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
          <span class="mt-2 block text-sm font-medium text-gray-900">
            Click to select a YAML file
          </span>
          <span class="mt-1 block text-xs text-gray-500">
            or drag and drop
          </span>
        </div>
      </label>
    </div>

    <div *ngIf="selectedFileName" class="text-sm text-gray-600">
      Selected: <span class="font-medium">{{ selectedFileName }}</span>
    </div>
  </div>
</mat-dialog-content>

<!-- Footer buttons -->
<div class="flex justify-center gap-3 px-6 py-3 bg-gray-100 rounded-b-lg">
  <!-- Upload in DOM first, but visually pushed right with order-last -->
  <button (click)="uploadFile(fileInput)" [disabled]="!selectedFile || uploading"
    class="order-last px-4 py-2 rounded bg-green-600 text-white hover:bg-green-700 disabled:opacity-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-400">
    {{ uploading ? 'Uploading...' : 'Upload' }}
  </button>

  <!-- Cancel in DOM second, visually pulled left with order-first -->
  <button (click)="dialogRef.close()"
    class="order-first px-4 py-2 rounded bg-gray-400 text-white hover:bg-gray-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-400">
    Cancel
  </button>
</div>
